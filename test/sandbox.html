<!doctype html>
<!-- Local sanity check for the Milestone 0 filter chain. NOT shipped.
     Open with ?filter=off to compare. Mirrors the exact primitive chain
     built in src/spike.ts (feFlood neutral + feImage data: map + feMerge
     + feDisplacementMap, sRGB interpolation). -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #000; font: 15px/1.4 -apple-system, sans-serif; }
  #column { width: 600px; margin: 0 auto; background: #15202b; }
  .tweet {
    border-bottom: 1px solid #38444d; padding: 12px 16px; color: #e7e9ea;
    background: repeating-linear-gradient(90deg, #15202b 0 28px, #1c2732 28px 30px);
  }
  .tweet b { color: #1d9bf0; }
</style>
</head>
<body>
<div id="column"></div>
<svg width="0" height="0" aria-hidden="true" style="position:absolute;width:0;height:0">
  <filter id="bh" x="-20%" y="-20%" width="140%" height="140%"
          color-interpolation-filters="sRGB" primitiveUnits="userSpaceOnUse">
    <feFlood flood-color="#808080" result="neutral"/>
    <feImage id="map" x="0" y="0" width="560" height="560"
             preserveAspectRatio="none" result="map"/>
    <feMerge result="fullmap">
      <feMergeNode in="neutral"/><feMergeNode in="map"/>
    </feMerge>
    <feDisplacementMap in="SourceGraphic" in2="fullmap" scale="60"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<script>
  const column = document.getElementById("column");
  for (let i = 0; i < 40; i++) {
    const t = document.createElement("div");
    t.className = "tweet";
    t.innerHTML = `<b>@user${i}</b> · tweet number ${i} — the quick brown fox jumps over the lazy dog, again and again, line after line.`;
    column.appendChild(t);
  }

  // Same map math as src/displacement.ts
  const SIZE = 256, EVENT_R = 0.15, STRENGTH = 0.05, MASS = 0.7;
  const cv = document.createElement("canvas");
  cv.width = cv.height = SIZE;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(SIZE, SIZE);
  const c = (SIZE - 1) / 2;
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    const nx = (x - c) / c, ny = (y - c) / c, r = Math.hypot(nx, ny);
    let dx = 0, dy = 0;
    if (r > 1e-4 && r < 1) {
      let m = (MASS * STRENGTH) / Math.max(r, EVENT_R) ** 2;
      const f = Math.min((1 - r) / 0.25, 1);
      m *= f * f * (3 - 2 * f);
      m = Math.min(m, 1);
      dx = (nx / r) * m; dy = (ny / r) * m;
    }
    const i = (y * SIZE + x) * 4;
    img.data[i] = Math.round(128 + dx * 127);
    img.data[i + 1] = Math.round(128 + dy * 127);
    img.data[i + 2] = 128;
    img.data[i + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  document.getElementById("map").setAttribute("href", cv.toDataURL("image/png"));

  const params = new URLSearchParams(location.search);
  if (params.get("filter") !== "off") {
    column.style.filter = "url(#bh)";
  }
  window.scrollTo(0, Number(params.get("scroll") ?? 0));
  // Headless --screenshot can't capture a scrolled viewport; ?offset=N
  // shifts the column up instead, which moves rect.top exactly like
  // scrolling does as far as the viewport→local conversion is concerned.
  const offset = Number(params.get("offset") ?? 0);
  if (offset) column.style.marginTop = `${-offset}px`;

  // Viewport anchoring, same per-frame conversion as src/renderer.ts:
  // hole fixed at viewport center; feImage x/y from live rect each rAF.
  const mapEl = document.getElementById("map");
  const R = 280;
  function tick() {
    requestAnimationFrame(tick);
    const rect = column.getBoundingClientRect();
    mapEl.setAttribute("x", (innerWidth / 2 - rect.left - R).toFixed(1));
    mapEl.setAttribute("y", (innerHeight / 2 - rect.top - R).toFixed(1));
  }
  tick();
</script>
</body>
</html>
