<!doctype html>
<!-- Visual check for HoleOverlay (the real class, bundled by `npm run
     build:overlay-sandbox` style esbuild call — see session docs). ?m=0.7
     sets mass. NOT shipped. -->
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #000; font: 15px/1.4 -apple-system, sans-serif; }
  #column { width: 600px; margin: 0 auto; background: #15202b; }
  .tweet { border-bottom: 1px solid #38444d; padding: 12px 16px; color: #e7e9ea; }
  .tweet b { color: #1d9bf0; }
</style>
</head>
<body>
<div id="column"></div>
<script src="./.overlay.bundle.js"></script>
<script>
  const { HoleOverlay } = window.EH;

  const column = document.getElementById("column");
  for (let i = 0; i < 14; i++) {
    const t = document.createElement("div");
    t.className = "tweet";
    t.innerHTML = `<b>@user${i}</b> · tweet number ${i} — the quick brown fox jumps over the lazy dog, again and again.`;
    column.appendChild(t);
  }

  const m = Number(new URLSearchParams(location.search).get("m") ?? 0.7);
  const overlay = new HoleOverlay();
  const maxR = Math.sqrt((0.35 * innerWidth * innerHeight) / Math.PI);
  const discR = maxR * Math.sqrt(m);
  const alpha = Math.min(1, m / 0.05);
  overlay.draw(innerWidth / 2, innerHeight / 2, discR, m, alpha);
</script>
</body>
</html>
